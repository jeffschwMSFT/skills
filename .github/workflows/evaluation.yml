name: evaluation

on:
  pull_request:
    paths:
      - 'src/**'
      - '.github/workflows/evaluation.yml'

  schedule:
    - cron: '0 */2 * * *'

  workflow_dispatch:
    inputs:
      components:
        description: 'Components to evaluate (comma-separated, empty=all tests)'
        required: false
        default: ''
      model:
        description: 'Copilot model to use'
        required: false
        default: 'claude-opus-4.5'
      judge-model:
        description: 'Judge model to use for evaluation'
        required: false
        default: 'claude-opus-4.5'
      runs:
        description: 'Number of runs per test'
        required: false
        type: number
        default: 3
      parallel-skills:
        description: 'Max concurrent skills to evaluate'
        required: false
        type: number
        default: 3
      parallel-runs:
        description: 'Max concurrent runs per scenario'
        required: false
        type: number
        default: 3
      verbose:
        description: 'Enable verbose output'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DOTNET_VERSION: '10.0.x'
  DEFAULT_MODEL: 'claude-opus-4.5'
  DEFAULT_JUDGE_MODEL: 'claude-opus-4.5'
  DEFAULT_RUNS: '3'
  DEFAULT_PARALLEL_SKILLS: '3'
  DEFAULT_PARALLEL_RUNS: '3'

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      entries: ${{ steps.find.outputs.entries }}
      has_entries: ${{ steps.find.outputs.has_entries }}
      components: ${{ steps.find.outputs.components }}
      has_components: ${{ steps.find.outputs.has_components }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find skills to evaluate
        id: find
        run: |
          $input = "${{ github.event.inputs.components }}"
          $entries = @()
          $components = @()

          if ($input) {
            # Manual input: use specified components (evaluate all skills)
            $components = @($input -split ',' | ForEach-Object { $_.Trim() })
            $entries = @($components | ForEach-Object {
              @{ name = $_; component = $_; skills_path = "src/$_/skills" }
            })
          } elseif ("${{ github.event_name }}" -eq "pull_request") {
            # PR: detect individual changed skills
            $base = "${{ github.event.pull_request.base.sha }}"
            $head = "${{ github.event.pull_request.head.sha }}"
            $changedFiles = git diff --name-only --diff-filter=ACMR $base $head

            # Extract unique component/skill pairs from changed files under src/*/skills/*/ or src/*/tests/*/
            # NOTE: Changes under src/*/skills/shared/ won't match here since shared directories
            # don't have SKILL.md files. Use workflow_dispatch to manually evaluate affected
            # components when shared resources change.
            $changedPairs = @($changedFiles |
              Where-Object { $_ -match '^src/([^/]+)/(skills|tests)/([^/]+)/' } |
              ForEach-Object { "$($Matches[1])/$($Matches[3])" } |
              Sort-Object -Unique)

            # Filter to skills that have a SKILL.md and a component tests directory
            $entries = @($changedPairs | ForEach-Object {
              $parts = $_ -split '/'
              $component = $parts[0]
              $skill = $parts[1]
              $skillMd = Join-Path "src" $component "skills" $skill "SKILL.md"
              $testsDir = Join-Path "src" $component "tests"
              if ((Test-Path $skillMd) -and (Test-Path $testsDir)) {
                @{
                  name = "$component--$skill"
                  component = $component
                  skills_path = "src/$component/skills/$skill"
                }
              }
            } | Where-Object { $_ })

            $components = @($entries | ForEach-Object { $_.component } | Sort-Object -Unique)
          } else {
            # Schedule/dispatch: evaluate all components with skills and tests
            $components = @(Get-ChildItem -Path "src" -Directory |
              Where-Object { (Test-Path (Join-Path $_.FullName "skills")) -and (Test-Path (Join-Path $_.FullName "tests")) } |
              Select-Object -ExpandProperty Name)
            $entries = @($components | ForEach-Object {
              @{ name = $_; component = $_; skills_path = "src/$_/skills" }
            })
          }

          # Output entries for evaluate matrix
          if (-not $entries -or $entries.Count -eq 0) {
            Write-Host "No entries to evaluate"
            echo "entries=[]" >> $env:GITHUB_OUTPUT
            echo "has_entries=false" >> $env:GITHUB_OUTPUT
          } else {
            $json = $entries | ConvertTo-Json -Compress -AsArray
            Write-Host "Entries to evaluate: $json"
            echo "entries=$json" >> $env:GITHUB_OUTPUT
            echo "has_entries=true" >> $env:GITHUB_OUTPUT
          }

          # Output components for publish-benchmark
          if (-not $components -or $components.Count -eq 0) {
            echo "components=[]" >> $env:GITHUB_OUTPUT
            echo "has_components=false" >> $env:GITHUB_OUTPUT
          } else {
            $cjson = $components | ConvertTo-Json -Compress -AsArray
            echo "components=$cjson" >> $env:GITHUB_OUTPUT
            echo "has_components=true" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

  evaluate:
    needs: discover
    if: needs.discover.outputs.has_entries == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: evaluate (${{ matrix.entry.name }})
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.discover.outputs.entries) }}

    steps:
      - name: Checkout skills repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build skill-validator
        run: cd eng/skill-validator && npm ci && npm run build

      - name: Run skill-validator
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN_2 }}
        run: |
          ARGS="--strict --require-evals"
          ARGS="$ARGS --reporter console --reporter json:.skill-validator-results/results.json"

          MODEL="${{ github.event.inputs.model || env.DEFAULT_MODEL }}"
          if [ -n "$MODEL" ]; then
            ARGS="$ARGS --model $MODEL"
          fi
          RUNS="${{ github.event.inputs.runs || env.DEFAULT_RUNS }}"
          if [ -n "$RUNS" ]; then
            ARGS="$ARGS --runs $RUNS"
          fi
          PARALLEL_SKILLS="${{ github.event.inputs.parallel-skills || env.DEFAULT_PARALLEL_SKILLS }}"
          if [ -n "$PARALLEL_SKILLS" ]; then
            ARGS="$ARGS --parallel-skills $PARALLEL_SKILLS"
          fi
          PARALLEL_RUNS="${{ github.event.inputs.parallel-runs || env.DEFAULT_PARALLEL_RUNS }}"
          if [ -n "$PARALLEL_RUNS" ]; then
            ARGS="$ARGS --parallel-runs $PARALLEL_RUNS"
          fi
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          JUDGE_MODEL="${{ github.event.inputs.judge-model || env.DEFAULT_JUDGE_MODEL }}"
          if [ -n "$JUDGE_MODEL" ]; then
            ARGS="$ARGS --judge-model $JUDGE_MODEL"
          fi

          node eng/skill-validator/dist/index.js $ARGS --tests-dir ./src/${{ matrix.entry.component }}/tests ./${{ matrix.entry.skills_path }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-validator-results-${{ matrix.entry.name }}
          path: .skill-validator-results/
          include-hidden-files: true
          retention-days: 30

      - name: Generate Summary
        if: always()
        run: |
          RESULTS_DIR=$(ls -d .skill-validator-results/run-* 2>/dev/null | head -1)
          if [ -z "$RESULTS_DIR" ]; then
            echo "## Skill Validation Results — ${{ matrix.entry.name }}" >> $GITHUB_STEP_SUMMARY
            echo "No results found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          RESULTS_FILE="$RESULTS_DIR/results.json"
          if [ ! -f "$RESULTS_FILE" ]; then
            echo "## Skill Validation Results — ${{ matrix.entry.name }}" >> $GITHUB_STEP_SUMMARY
            echo "No results.json found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Generate markdown summary from results
          node -e "
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('$RESULTS_FILE', 'utf8'));
          let md = '## Skill Validation Results — ${{ matrix.entry.name }}\n\n';
          md += '| Skill | Test | Baseline | With Skill | Δ | Verdict |\n';
          md += '|-------|----------|----------|------------|---|--------|\n';
          for (const v of results.verdicts) {
            for (const s of v.scenarios) {
              const base = s.baseline?.judgeResult?.overallScore?.toFixed(1) ?? '—';
              const skill = s.withSkill?.judgeResult?.overallScore?.toFixed(1) ?? '—';
              const delta = (s.withSkill?.judgeResult?.overallScore - s.baseline?.judgeResult?.overallScore)?.toFixed(1);
              const deltaStr = delta > 0 ? '+' + delta : delta;
              const icon = v.passed ? '✅' : '❌';
              md += '| ' + v.skillName + ' | ' + s.scenarioName + ' | ' + base + '/5 | ' + skill + '/5 | ' + deltaStr + ' | ' + icon + ' |\n';
            }
          }
          md += '\nModel: ' + results.model + ' | Judge: ' + results.judgeModel + '\n';
          md += '\n[Full results](' + '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' + ')\n';
          fs.writeFileSync('.skill-validator-results/summary.md', md);
          process.stdout.write(md);
          " >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file .skill-validator-results/summary.md

  publish-benchmark:
    needs: [discover, evaluate]
    if: github.ref == 'refs/heads/main' && needs.discover.outputs.has_components == 'true'
    concurrency:
      group: publish-benchmark-deploy
      cancel-in-progress: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download evaluation artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: skill-validator-results-*
          path: all-results/
          merge-multiple: false

      - name: Fetch existing benchmark data
        run: |
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          mkdir -p /tmp/gh-pages/data
          git checkout gh-pages -- data/ 2>/dev/null && cp -r data/* /tmp/gh-pages/data/ && git checkout HEAD -- . || true

      - name: Generate Benchmark Data
        run: |
          $sha = "${{ github.sha }}"
          $commitMsg = git log -1 --format='%s' $sha
          $commitTimestamp = git log -1 --format='%aI' $sha
          $commitAuthor = git log -1 --format='%an' $sha

          $commitJson = @{
            id        = $sha
            message   = $commitMsg
            timestamp = $commitTimestamp
            url       = "https://github.com/${{ github.repository }}/commit/$sha"
            author    = @{ name = $commitAuthor; username = "${{ github.actor }}" }
          } | ConvertTo-Json -Compress

          # Process each component's results
          $components = '${{ needs.discover.outputs.components }}' | ConvertFrom-Json
          foreach ($component in $components) {
            $artifactDir = "all-results/skill-validator-results-$component"
            $runDir = Get-ChildItem -Path $artifactDir -Directory -Filter "run-*" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $runDir) {
              Write-Warning "No run results found for $component, skipping benchmark generation"
              continue
            }

            Write-Host "`n=== Generating benchmark data for: $component ==="
            $existingFile = "/tmp/gh-pages/data/$component.json"
            $params = @{
              ResultsDir    = $runDir.FullName
              ComponentName = $component
              OutputDir     = "/tmp/gh-pages/data"
              CommitJson    = $commitJson
            }
            if ((Test-Path $existingFile) -and (Get-Content $existingFile -Raw -ErrorAction SilentlyContinue)) {
              $params.ExistingDataFile = $existingFile
            }
            & ./eng/dashboard/generate-benchmark-data.ps1 @params
          }

          # Generate components.json manifest
          $components = Get-ChildItem -Path "/tmp/gh-pages/data" -Filter "*.json" -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -ne "components.json" } |
            ForEach-Object { $_.BaseName }
          @($components) | ConvertTo-Json -AsArray | Out-File -FilePath "/tmp/gh-pages/data/components.json" -Encoding utf8
        shell: pwsh

      - name: Deploy to GitHub Pages
        run: |
          cd /tmp
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages > /dev/null 2>&1; then
            git clone --branch gh-pages --single-branch "$REPO_URL" deploy
          else
            mkdir deploy && cd deploy && git init && git checkout -b gh-pages
            git remote add origin "$REPO_URL"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            cd /tmp
          fi

          cd /tmp/deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p data
          cp /tmp/gh-pages/data/*.json data/
          cp ${{ github.workspace }}/eng/dashboard/dashboard.html index.html
          cp ${{ github.workspace }}/eng/dashboard/dashboard.js dashboard.js

          git add .
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Update benchmark data"
          git push origin gh-pages

  no-changes:
    needs: discover
    if: github.event_name == 'pull_request' && needs.discover.outputs.has_entries != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report no entries changed
        run: |
          echo "## Skill Evaluation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No skills with tests were modified in this PR." >> $GITHUB_STEP_SUMMARY
