name: exp-test-tagging
description: Evaluates the dotnet-experimental/exp-test-tagging skill
type: capability
config:
  timeout: 6m
stimuli:
  - name: Tag an untagged MSTest test suite
    prompt: I have an MSTest test project at OrderService.Tests/ with about 20 tests covering an OrderProcessor class. None
      of the tests have any category attributes yet. Can you analyze each test and add appropriate category tags? I'd
      also like a summary of the distribution when you're done.
    environment:
      files:
        - src: fixtures/mstest-untagged/OrderService.Tests/OrderService.Tests.csproj
          dest: OrderService.Tests/OrderService.Tests.csproj
        - src: fixtures/mstest-untagged/OrderService.Tests/OrderProcessorTests.cs
          dest: OrderService.Tests/OrderProcessorTests.cs
        - src: fixtures/mstest-untagged/OrderService/OrderService.csproj
          dest: OrderService/OrderService.csproj
        - src: fixtures/mstest-untagged/OrderService/Order.cs
          dest: OrderService/Order.cs
        - src: fixtures/mstest-untagged/OrderService/OrderProcessor.cs
          dest: OrderService/OrderProcessor.cs
    graders:
      - type: file-contains
        config:
          path: OrderService.Tests/OrderProcessorTests.cs
          value: TestCategory
      - type: output-matches
        config:
          pattern: positive|negative
      - type: output-matches
        config:
          pattern: (distribution|summary|trait|count)
      - type: prompt
      - type: pairwise
    rubric:
      - Tagged the happy-path PlaceOrder tests (ValidInput, MultipleItems, SendsConfirmationEmail) as positive
      - Tagged the exception-throwing tests (NullEmail, EmptyEmail, InvalidEmailFormat, etc.) as negative
      - Identified the boundary-adjacent tests that operate on zero, negative, or empty values (ZeroQuantity,
        NegativePrice, EmptyItemList, ZeroTotal, Exactly500Points) and tagged them accordingly
      - Used the correct MSTest attribute syntax [TestCategory("...")]
      - Produced a summary showing the count or distribution of tags across the test suite
      - Every test method received at least one positive or negative tag
  - name: Tag an untagged xUnit test suite
    prompt: I have an xUnit test project at OrderService.Tests/ with about 20 tests covering an OrderProcessor class. None
      of the tests have any trait attributes yet. Can you analyze each test and add appropriate category tags? I'd also
      like a summary of the distribution when you're done.
    environment:
      files:
        - src: fixtures/xunit-untagged/OrderService.Tests/OrderService.Tests.csproj
          dest: OrderService.Tests/OrderService.Tests.csproj
        - src: fixtures/xunit-untagged/OrderService.Tests/OrderProcessorTests.cs
          dest: OrderService.Tests/OrderProcessorTests.cs
        - src: fixtures/xunit-untagged/OrderService/OrderService.csproj
          dest: OrderService/OrderService.csproj
        - src: fixtures/xunit-untagged/OrderService/Order.cs
          dest: OrderService/Order.cs
        - src: fixtures/xunit-untagged/OrderService/OrderProcessor.cs
          dest: OrderService/OrderProcessor.cs
    graders:
      - type: file-contains
        config:
          path: OrderService.Tests/OrderProcessorTests.cs
          value: "[Trait("
      - type: output-matches
        config:
          pattern: positive|negative
      - type: output-matches
        config:
          pattern: (distribution|summary|trait|count)
      - type: prompt
      - type: pairwise
    rubric:
      - Tagged the happy-path PlaceOrder tests (ValidInput, MultipleItems, SendsConfirmationEmail) as positive
      - Tagged the exception-throwing tests (NullEmail, EmptyEmail, InvalidEmailFormat, etc.) as negative
      - Identified the boundary-adjacent tests that operate on zero, negative, or empty values (ZeroQuantity,
        NegativePrice, EmptyItemList, ZeroTotal, Exactly500Points) and tagged them accordingly
      - Used the correct xUnit attribute syntax [Trait("Category", "...")]
      - Produced a summary showing the count or distribution of tags across the test suite
      - Every test method received at least one positive or negative tag
  - name: Tag an untagged NUnit test suite
    prompt: I have an NUnit test project at OrderService.Tests/ with about 20 tests covering an OrderProcessor class. None
      of the tests have any Category attributes yet. Can you analyze each test and add appropriate category tags? I'd
      also like a summary of the distribution when you're done.
    environment:
      files:
        - src: fixtures/nunit-untagged/OrderService.Tests/OrderService.Tests.csproj
          dest: OrderService.Tests/OrderService.Tests.csproj
        - src: fixtures/nunit-untagged/OrderService.Tests/OrderProcessorTests.cs
          dest: OrderService.Tests/OrderProcessorTests.cs
        - src: fixtures/nunit-untagged/OrderService/OrderService.csproj
          dest: OrderService/OrderService.csproj
        - src: fixtures/nunit-untagged/OrderService/Order.cs
          dest: OrderService/Order.cs
        - src: fixtures/nunit-untagged/OrderService/OrderProcessor.cs
          dest: OrderService/OrderProcessor.cs
    graders:
      - type: file-contains
        config:
          path: OrderService.Tests/OrderProcessorTests.cs
          value: "[Category("
      - type: output-matches
        config:
          pattern: positive|negative
      - type: output-matches
        config:
          pattern: (distribution|summary|trait|count)
      - type: prompt
      - type: pairwise
    rubric:
      - Tagged the happy-path PlaceOrder tests (ValidInput, MultipleItems, SendsConfirmationEmail) as positive
      - Tagged the exception-throwing tests (NullEmail, EmptyEmail, InvalidEmailFormat, etc.) as negative
      - Identified the boundary-adjacent tests that operate on zero, negative, or empty values (ZeroQuantity,
        NegativePrice, EmptyItemList, ZeroTotal, Exactly500Points) and tagged them accordingly
      - Used the correct NUnit attribute syntax [Category("...")]
      - Produced a summary showing the count or distribution of tags across the test suite
      - Every test method received at least one positive or negative tag
  - name: Audit test distribution without modifying files
    prompt: I want to understand the test coverage shape of my OrderService.Tests project. Can you analyze the tests and
      give me a breakdown of how many are positive vs negative, whether we have boundary and critical-path coverage, and
      any gaps you see? Don't modify any files — just give me the analysis.
    environment:
      files:
        - src: fixtures/mstest-untagged/OrderService.Tests/OrderService.Tests.csproj
          dest: OrderService.Tests/OrderService.Tests.csproj
        - src: fixtures/mstest-untagged/OrderService.Tests/OrderProcessorTests.cs
          dest: OrderService.Tests/OrderProcessorTests.cs
        - src: fixtures/mstest-untagged/OrderService/OrderService.csproj
          dest: OrderService/OrderService.csproj
        - src: fixtures/mstest-untagged/OrderService/Order.cs
          dest: OrderService/Order.cs
        - src: fixtures/mstest-untagged/OrderService/OrderProcessor.cs
          dest: OrderService/OrderProcessor.cs
    graders:
      - type: output-matches
        config:
          pattern: positive|negative
      - type: output-matches
        config:
          pattern: (boundary|edge|limit)
      - type: prompt
      - type: pairwise
    rubric:
      - Counted or categorized the tests into positive and negative groups
      - Identified tests that cover boundary conditions (zero quantity, negative price, empty list, zero total,
        exactly-500-points tier boundary)
      - Provided observations about the test distribution balance or coverage gaps
      - Did NOT modify OrderProcessorTests.cs — analysis only
  - name: Decline request to write new tests
    prompt: I need to write unit tests for my PaymentGateway class. It handles credit card charges, refunds, and webhook
      processing. Can you help me write comprehensive MSTest tests?
    environment:
      files:
        - src: ./fixtures/decline-request-to-write-new-tests/PaymentGateway.cs
          dest: PaymentGateway.cs
    graders:
      - type: output-matches
        config:
          pattern: (TestMethod|TestClass|\[Fact\]|test)
      - type: prompt
      - type: pairwise
    rubric:
      - Wrote test methods for the PaymentGateway class
      - Covered both success and failure scenarios
    constraints:
      reject_skills:
        - "*"
